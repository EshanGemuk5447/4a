<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4a</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
            text-align: center;
        }

        header {
            background-color: #222;
            color: #fff;
            padding: 20px 0;
        }

        header img {
            width: 100px;
            height: auto;
        }

        h1 {
            margin: 10px 0 5px;
            font-size: 2em;
        }

        .tagline {
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .description {
            max-width: 600px;
            margin: 0 auto 20px;
            font-size: 1em;
            line-height: 1.5;
        }

        .archive-info {
            margin-bottom: 20px;
            font-weight: bold;
        }

        .download-button {
            display: inline-block;
            padding: 12px 25px;
            font-size: 1em;
            font-weight: bold;
            text-decoration: none;
            color: #fff;
            background-color: #0078d7;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .download-button:hover {
            background-color: #005a9e;
        }

        footer {
            background-color: #222;
            color: #fff;
            padding: 15px 0;
            position: fixed;
            width: 100%;
            bottom: 0;
        }

        @media (max-width: 600px) {
            .description {
                padding: 0 15px;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/EshanGemuk5447/4a/main/4a.png" alt="4a Logo">
        <h1>4a: Modernize your Linux</h1>
    </header>

    <main>
        <p class="description">
            4a is a short term for (4-Apple). 4a purpose was to make your Linux more superior, beautiful and modern. We will list any file for Linux.
        </p>

        <p class="archive-info">Firefox: 22/4/2026 Archived</p>

        <a class="download-button" href="https://archive.org/download/firefox-4a/firefox-4a.libin" download>
            Download Firefox
        </a>
    </main>

    <footer>
        4a GROUP. All rights reserved.
    </footer>

</body>
</html>
